name = "incassocheck-worker"
main = "worker/index.js"
compatibility_date = "2024-12-01"

compatibility_flags = ["nodejs_compat"]

workers_dev = true
minify = true

# Secrets (instellen via Cloudflare dashboard of CLI):
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put RESEND_API_KEY

[observability]
enabled = true

[[rules]]
type = "Text"
globs = ["prompts/**/*.txt"]
fallthrough = true
